<!DOCTYPE html>
<html lang="sw">
<head>
  <meta charset="UTF-8">
  <title>Swahili-Time - Nyumbani</title>
  <style>
    /* Muundo wa msingi wa ukurasa */
    body { 
      font-family: Arial, sans-serif; 
      margin: 0; 
      padding: 0; 
      min-height: 100vh; 
      display: flex; 
      flex-direction: column; 
      background-color: #f4f4f4; 
    }

    .content { flex: 1; padding: 20px; }
    h1 { text-align: center; color: #333; }

    /* Muundo wa Gridi ya Filamu */
    .movie-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 30px;
      padding: 20px;
      max-width: 1000px;
      margin: 0 auto;
    }

    .movie-card {
      background: white;
      border-radius: 15px;
      padding: 15px;
      text-align: center;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      transition: transform 0.3s;
    }
    .movie-card:hover { transform: scale(1.03); }
    .movie-card img { width: 100%; height: 300px; object-fit: cover; border-radius: 10px; }
    .movie-card a { text-decoration: none; color: black; }

    /* Navigation (Footer) */
    nav { 
      margin-top: auto; 
      background-color: #333; 
      padding: 30px 0; 
    }
    nav ul { 
      list-style-type: none; 
      padding: 0; 
      margin: 0; 
      display: flex; 
      justify-content: center; 
      gap: 30px; 
    }
    nav ul li a { 
      color: white; 
      text-decoration: none; 
      font-size: 20px; 
      font-weight: bold; 
      padding: 15px 30px; 
      background-color: #555; 
      border-radius: 10px; 
    }
    nav ul li a:hover { background-color: #ff4500; }
  </style>
</head>
<body>

  <div class="content">
    <h1>Filamu Maarufu</h1>
    <div class="movie-grid">
      
      <div class="movie-card">
        <a href="video.html">
          <img src="filamu1.jpg" alt="Filamu 1">
          <h3>Jina la Filamu 1</h3>
        </a>
      </div>

      <div class="movie-card">
        <a href="video.html">
          <img src="https://via.placeholder.com/250x300" alt="Filamu 2">
          <h3>Jina la Filamu 2</h3>
        </a>
      </div>

    </div>
  </div>

  <nav>
    <ul>
      <li><a href="index.html">HOME</a></li>
      <li><a href="video.html">MOVIE</a></li>
      <li><a href="premium.html">PREMIUM</a></li>
      <li><a href="about.html">ABOUT</a></li>
    </ul>
  </nav>

  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyApXjudKe5yRzDKgImwpUVzDeVSnFFteGk",
    authDomain: "swahili-time.firebaseapp.com",
    projectId: "swahili-time",
    storageBucket: "swahili-time.firebasestorage.app",
    messagingSenderId: "759785866658",
    appId: "1:759785866658:web:117e800379830cc07b5efb",
    measurementId: "G-RYCTQ0Q0PH"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  async function loadMovies() {
    const movieGrid = document.querySelector(".movie-grid");
    const querySnapshot = await getDocs(collection(db, "Movies"));
    movieGrid.innerHTML = ""; 
    querySnapshot.forEach((doc) =>  
querySnapshot.forEach((doc) => {
  const movie = doc.data();
  movieGrid.innerHTML += `
    <div class="movie-card">
      <a href="video.html?id=${doc.id}">
        <img src="${movie.imageUrl}" alt="${movie.Title}">
        <h3>${movie.Title}</h3>
      </a>
    </div>
  `;
});
    });
  }
  loadMovies();
  </script> 
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Swahili-Time</title>
  <style>
    /* Muundo wa ukurasa mzima */
    body { 
      font-family: Arial, sans-serif; 
      margin: 0; 
      padding: 0; 
      min-height: 100vh; 
      display: flex; 
      flex-direction: column; 
    }

    /* Sehemu ya logo */
    .logo-container {
      text-align: center;
      padding: 20px;
    }

    .logo-container img {
      width: 200px;
      border-radius: 10px;
    }

    .content {
      flex: 1; 
      text-align: center;
      padding-top: 20px;
    }

    /* Muundo wa eneo la chini la menyu */
    nav {
      background-color: #f8f8f8;
      padding: 30px 0;
      border-top: 2px solid #ddd;
    }

    nav ul {
      list-style-type: none;
      padding: 0;
      margin: 0;
      display: flex;
      justify-content: center;
      gap: 30px; /* Nafasi kati ya button na button */
    }

    nav ul li a {
      color: white;
      background-color: #333;
      padding: 15px 30px; /* Ukubwa wa button */
      text-decoration: none;
      border-radius: 8px; /* Kona za button */
      font-size: 18px; /* Ukubwa wa maandishi */
      font-weight: bold;
      transition: background-color 0.3s;
    }

    nav ul li a:hover {
      background-color: #555; /* Rangi ikiguswa */
    }
  </style>
</head>
<body>

<div class="logo-container">
  <img src="IMG_20260628_091107.png" alt="Logo ya Swahili-Time">
</div>

<div class="content">
  <h1>Karibu Swahili-Time</h1>
  <p>Enjoy New movie.</p>
</div>

<nav>
  <ul>
    <li><a href="index.html">Nyumbani</a></li>
    <li><a href="#">Video Mpya</a></li>
    <li><a href="#">Premium</a></li>
    <li><a href="#">Kuhusu Sisi</a></li>
  </ul>
</nav>

</body>
</html>

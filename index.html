<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Swahili-Time</title>
  <style>
    /* 1. Muundo wa Body - unaruhusu nav kukaa chini */
    body { 
      font-family: Arial, sans-serif; 
      margin: 0; 
      padding: 0; 
      min-height: 100vh; 
      display: flex; 
      flex-direction: column; 
      background-color: #f4f4f4; 
    }

    .content { flex: 1; padding: 20px; }

    /* 2. Grid ya Filamu */
    .movie-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 30px;
      padding: 20px;
    }

    .movie-card {
      background: white;
      border-radius: 15px;
      padding: 15px;
      text-align: center;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }

    .movie-card img { width: 100%; border-radius: 10px; }

    /* 3. Navigation ya Chini (Footer Nav) */
    nav { 
      margin-top: auto; 
      background-color: #333; 
      padding: 30px 0; 
    }

    nav ul { 
      list-style-type: none; 
      padding: 0; 
      margin: 0; 
      display: flex; 
      justify-content: center; 
      gap: 30px; 
    }

    nav ul li a { 
      color: white; 
      text-decoration: none; 
      font-size: 20px; 
      font-weight: bold; 
      padding: 15px 30px; 
      background-color: #555; 
      border-radius: 10px; 
    }
  </style>
</head>
<body>

  <div class="content">
    <h1 style="text-align: center;">Filamu Maarufu</h1>
    <div class="movie-grid">
      <div class="movie-card">
        <a href="video.html"><img src="https://via.placeholder.com/250" alt="Filamu"></a>
        <h3>Jina la Filamu 1</h3>
      </div>
      <div class="movie-card">
        <a href="video.html"><img src="https://via.placeholder.com/250" alt="Filamu"></a>
        <h3>Jina la Filamu 2</h3>
      </div>
    </div>
  </div>

  <nav>
    <ul>
      <li><a href="index.html">HOME</a></li>
      <li><a href="video.html">MOVIE</a></li>
      <li><a href="premium.html">PREMIUM</a></li>
      <li><a href="about.html">ABOUT</a></li>
    </ul>
  </nav>

</body>
</html>

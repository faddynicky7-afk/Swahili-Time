<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Swahili-Time - HOME</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f4f4; }
    
    /* Grid ya Filamu */
    .movie-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    /* Kadi ya kila filamu */
    .movie-card {
      background: white;
      border-radius: 10px;
      overflow: hidden;
      text-align: center;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      transition: transform 0.3s;
    }
    
    .movie-card:hover { transform: scale(1.05); }

    .movie-card img { width: 100%; height: 250px; object-fit: cover; }
    .movie-card h3 { padding: 10px; margin: 0; font-size: 16px; }
    
    nav { background-color: #333; padding: 15px; text-align: center; }
    nav a { color: white; margin: 0 15px; text-decoration: none; font-weight: bold; }
  </style>
</head>
<body>

<nav>
  <a href="index.html">HOME</a>
  <a href="video.html">MOVIES</a>
  <a href="premium.html">PREMIUM</a>
</nav>

<div class="movie-grid">
  <div class="movie-card">
    <a href="video.html">
      <img src="https://via.placeholder.com/200x250" alt="Filamu 1">
      <h3>Jina la Filamu 1</h3>
    </a>
  </div>

  <div class="movie-card">
    <a href="video.html">
      <img src="https://via.placeholder.com/200x250" alt="Filamu 2">
      <h3>Jina la Filamu 2</h3>
    </a>
  </div>
</div>

</body>
</html>

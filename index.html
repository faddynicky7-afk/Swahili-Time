<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Swahili-Time - Nyumbani</title>
  <style>
    /* Muundo wa msingi */
    body { 
      font-family: Arial, sans-serif; 
      margin: 0; 
      padding: 0; 
      min-height: 100vh; 
      display: flex; 
      flex-direction: column; 
      background-color: #f4f4f4; 
    }

    /* Eneo la maudhui */
    .content { 
      flex: 1; 
      padding: 20px; 
    }

    /* Grid ya Filamu */
    .movie-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 30px;
      padding: 20px;
    }

    .movie-card {
      background: white;
      border-radius: 15px;
      overflow: hidden;
      text-align: center;
      box-shadow: 0 6px 12px rgba(0,0,0,0.15);
      transition: transform 0.3s;
    }
    
    .movie-card:hover { transform: scale(1.03); }

    .movie-card img { width: 100%; height: 300px; object-fit: cover; }
    .movie-card h3 { padding: 15px; margin: 0; font-size: 18px; color: #333; }

    /* Navigation (Iko chini kabisa na ni kubwa) */
    nav { 
      margin-top: auto; 
      background-color: #222; 
      padding: 50px 0; 
      border-top: 5px solid #000; 
    }

    nav ul { 
      list-style-type: none; 
      padding: 0; 
      margin: 0; 
      display: flex; 
      justify-content: center; 
      gap: 60px; /* Nafasi kubwa kati ya vifungo */
    }

    nav ul li a { 
      color: white; 
      text-decoration: none; 
      font-size: 26px; /* Font kubwa */
      font-weight: bold; 
      padding: 25px 50px; /* Vifungo vikubwa */
      background-color: #444;
      border-radius: 15px;
      transition: 0.3s;
    }

    nav ul li a:hover {
      background-color: #ff4500;
    }
  </style>
</head>
<body>

  <div class="content">
    <h1 style="text-align: center;">Filamu Maarufu</h1>
    
    <div class="movie-grid">
      <!-- Mfano wa Kadi ya Filamu -->
      <div class="movie-card">
        <a href="video.html" style="text-decoration: none;">
          <img src="https://via.placeholder.com/250x300" alt="Filamu">
          <h3>Jina la Filamu 1</h3>
        </a>
      </div>

      <div class="movie-card">
        <a href="video.html" style="text-decoration: none;">
          <img src="https://via.placeholder.com/250x300" alt="Filamu">
          <h3>Jina la Filamu 2</h3>
        </a>
      </div>
    </div>
  </div>

  <nav>
    <ul>
      <li><a href="index.html">HOME</a></li>
      <li><a href="video.html">MOVIE</a></li>
      <li><a href="premium.html">PREMIUM</a></li>
      <li><a href="about.html">ABOUT</a></li>
    </ul>
  </nav>

</body>
</html>

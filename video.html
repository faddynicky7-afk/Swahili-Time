<!DOCTYPE html>
<html>
<head>
    <title>Swahili Time - Inacheza...</title>
</head>
<body>
    <h1 id="movie-title">Inapakia filamu...</h1>
    
    <video id="video-player" controls width="100%" height="auto">
        <source src="" type="video/mp4">
        Browser yako haitumii video tag.
    </video>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyApXjudKe5yRzDKgImwpUVzDeVSnFFteGk",
            authDomain: "swahili-time.firebaseapp.com",
            projectId: "swahili-time",
            storageBucket: "swahili-time.firebasestorage.app",
            messagingSenderId: "759785866658",
            appId: "1:759785866658:web:117e800379830cc07b5efb",
            measurementId: "G-RYCTQ0Q0PH"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const movieId = urlParams.get('id');

        async function loadVideo() {
            if (movieId) {
                const docRef = doc(db, "Movies", movieId);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const movie = docSnap.data();
                    document.getElementById("movie-title").innerText = movie.Title;
                    
                    // Hapa tunaweka source ya video moja kwa moja kutoka Cloudinary
                    const videoPlayer = document.getElementById("video-player");
                    videoPlayer.src = movie.Videosource;
                    videoPlayer.load(); // Inabidi i-load tena baada ya kubadilisha src
                }
            }
        }
        loadVideo();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swahili Time - Inacheza...</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 20px; }
        #video-player { max-width: 800px; width: 100%; border-radius: 8px; background: #000; }
    </style>
</head>
<body>

    <h1 id="movie-title">Inapakia filamu...</h1>
    <video id="video-player" controls width="100%" height="auto" src=""></video>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyApXjudKe5yRzDKgImwpUVzDeVSnFFteGk",
            authDomain: "swahili-time.firebaseapp.com",
            projectId: "swahili-time",
            storageBucket: "swahili-time.firebasestorage.app",
            messagingSenderId: "759785866658",
            appId: "1:759785866658:web:117e800379830cc07b5efb",
            measurementId: "G-RYCTQ0Q0PH"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const movieId = urlParams.get('id');

        async function loadVideo() {
            if (!movieId) {
                document.getElementById("movie-title").innerText = "Filamu haikupatikana!";
                return;
            }

            try {
                console.log("Natafuta ID kwenye database:", movieId);
                const docRef = doc(db, "Movies", movieId);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const movie = docSnap.data();
                    document.getElementById("movie-title").innerText = movie.Title;
                    
                    const videoPlayer = document.getElementById("video-player");
                    videoPlayer.src = movie.Videosource;
                    videoPlayer.load();
                } else {
                    document.getElementById("movie-title").innerText = "ID haipo: " + movieId;
                }
            } catch (error) {
                console.error("Hitilafu:", error);
                document.getElementById("movie-title").innerText = "Imeshindikana kupakia data.";
            }
        }
        loadVideo();
    </script>
</body>
</html>
